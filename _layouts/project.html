---
layout: default
---

{% include back_link.html %}

<article>
    <h1>{{ page.title }}</h1>

    {% for page in site.pages %}
    {% if page.categories contains 'project' %}
    <div class="item">
        <h3>{{page.title}}</h3>
        <p>{{page.description}}</p>
    </div>
    {% endif %}
    {% endfor %}

    {{ content }}
</article>
